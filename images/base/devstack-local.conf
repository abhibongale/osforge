[[local|localrc]]
# Non-interactive mode
FORCE_PREREQ=1
RECLONE=yes

# Authentication
ADMIN_PASSWORD=secret
DATABASE_PASSWORD=$ADMIN_PASSWORD
RABBIT_PASSWORD=$ADMIN_PASSWORD
SERVICE_PASSWORD=$ADMIN_PASSWORD

# Logging
LOGFILE=/opt/stack/logs/devstack.log
LOGDAYS=1
LOG_COLOR=False

# Ironic settings
enable_plugin ironic https://opendev.org/openstack/ironic
VIRT_DRIVER=ironic

# Default to Ironic instances
DEFAULT_INSTANCE_TYPE=baremetal

# VM configuration for virtual baremetal
IRONIC_VM_COUNT=2
IRONIC_VM_SPECS_CPU=2
IRONIC_VM_SPECS_RAM=2750
IRONIC_VM_SPECS_DISK=4
IRONIC_BAREMETAL_BASIC_OPS=True

# Deploy interface
IRONIC_DEFAULT_DEPLOY_INTERFACE=direct
IRONIC_ENABLED_DEPLOY_INTERFACES=direct,iscsi

# Boot interface
IRONIC_DEFAULT_BOOT_INTERFACE=ipxe
IRONIC_ENABLED_BOOT_INTERFACES=ipxe,pxe

# Networking
# Note: OVN is preferred over openvswitch for container deployments
# as it's the default ML2 mechanism driver in modern OpenStack
Q_AGENT=ovn
Q_ML2_TENANT_NETWORK_TYPE=geneve

# OVS userspace datapath (no kernel module required)
# Runs OVS entirely in userspace using netdev datapath
# Only requires TUN/TAP driver (built into kernel)
OVS_DATAPATH_TYPE=netdev

IRONIC_PROVISION_NETWORK_NAME=ironic-provision
IRONIC_PROVISION_SUBNET_PREFIX=10.0.5.0/24
IRONIC_PROVISION_SUBNET_GATEWAY=10.0.5.1

# Disable unnecessary services
disable_service horizon
disable_service cinder c-api c-sch c-vol
disable_service heat h-api h-api-cfn h-api-cw h-eng
disable_service ir-novnc  # Disable VNC to avoid nested container builds

# Enable Swift
enable_service s-proxy s-object s-container s-account

# Enable Tempest
enable_service tempest

# Swift configuration
SWIFT_HASH=66a3d6b56c1f479c8b4e70ab5c2000f5
SWIFT_REPLICAS=1
SWIFT_DATA_DIR=/opt/stack/data/swift
SWIFT_ENABLE_TEMPURLS=True
SWIFT_TEMPURL_KEY=b3968d0207b54ece87cccc06515a89d4

# Image settings
IMAGE_URLS="http://download.cirros-cloud.net/0.6.0/cirros-0.6.0-x86_64-disk.img"
DEFAULT_IMAGE_NAME=cirros-0.6.0-x86_64-disk

# Performance tuning
API_WORKERS=1

# Resource limits
IRONIC_VM_EPHEMERAL_DISK=0

[[post-config|$IRONIC_CONF_FILE]]
[DEFAULT]
debug = True

[conductor]
automated_clean = True

[deploy]
default_boot_option = local
